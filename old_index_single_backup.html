      if (!name) return "תשרי";
      const clean = name.replace(/['"״׳]/g, '').trim().toLowerCase();
      if (clean.includes("תשרי") || clean.includes("tishri") || clean.includes("тишрей")) return "תשרי";
      if (clean.includes("חשון") || clean.includes("חשוון") || clean.includes("мархешван") || clean.includes("cheshvan")) return "חשוון";
      if (clean.includes("כסלו") || clean.includes("kislev") || clean.includes("кислев")) return "כסלו";
      if (clean.includes("טבת") || clean.includes("tevet") || clean.includes("тевет")) return "טבת";
      if (clean.includes("שבט") || clean.includes("shevat") || clean.includes("шват")) return "שבט";
      if (clean.includes("אדר א") || clean.includes("adar i") || clean.includes("адар i")) return "אדר א׳";
      if (clean.includes("אדר ב") || clean.includes("adar ii") || clean.includes("адар ii")) return "אדר ב׳";
      if (clean === "אדר" || clean === "adar" || clean === "адар") return "אדר ב׳";
      if (clean.includes("ניסן") || clean.includes("nisan") || clean.includes("нисан")) return "ניסן";
      if (clean.includes("אייר") || clean.includes("iyar") || clean.includes("ияр")) return "אייר";
      if (clean.includes("סיון") || clean.includes("sivan") || clean.includes("сиван")) return "סיון";
      if (clean.includes("תמוז") || clean.includes("tammuz") || clean.includes("таммуз")) return "תמוז";
      if (clean.includes("אב") || clean.includes("av") || clean.includes("ав")) return "אב";
      if (clean.includes("אלול") || clean.includes("elul") || clean.includes("элул")) return "אלול";
      return "תשרי";
    }

    function isHebrewLeapYear(year) {
      return [0, 3, 6, 8, 11, 14, 17].includes(year % 19);
    }

    // Standardized parser using Intl API
    function getHebrewDateInfo(date) {
      const formatter = new Intl.DateTimeFormat('he-IL-u-ca-hebrew-nu-latn', {
        day: 'numeric', month: 'long', year: 'numeric'
      });
      const parts = formatter.formatToParts(date);
      let day = 1, monthName = "תשרי", year = 5786;
      for (const part of parts) {
        if (part.type === 'day') day = parseInt(part.value, 10);
        else if (part.type === 'month') monthName = part.value;
        else if (part.type === 'year') year = parseInt(part.value, 10);
      }
      return { day, monthName, year, normalizedMonth: normalizeMonthName(monthName), isLeapYear: isHebrewLeapYear(year) };
    }

    function gimatriya(num) {
      const lookup = {
        1: "א׳", 2: "ב׳", 3: "ג׳", 4: "ד׳", 5: "ה׳", 6: "ו׳", 7: "ז׳", 8: "ח׳", 9: "ט׳",
        10: "י׳", 11: "יא׳", 12: "יב׳", 13: "יג׳", 14: "יד׳", 15: "טו׳", 16: "טז׳", 17: "יז׳", 18: "יח׳", 19: "יט׳",
        20: "כ׳", 21: "כא׳", 22: "כב׳", 23: "כג׳", 24: "כד׳", 25: "כה׳", 26: "כו׳", 27: "כז׳", 28: "כח׳", 29: "כט׳", 30: "ל׳"
      };
      return lookup[num] || num.toString();
    }

    function getLocalizedHebrewDate(dayNum, monthName, lang) {
      const normalized = normalizeMonthName(monthName);
      const idx = HEBREW_MONTHS_HE.indexOf(normalized);
      const monthStr = lang === 'he' ? HEBREW_MONTHS_HE[idx] : lang === 'en' ? HEBREW_MONTHS_EN[idx] : HEBREW_MONTHS_RU[idx];
      const dayStr = lang === 'he' ? gimatriya(dayNum) : dayNum.toString();
      return lang === 'he' ? `${dayStr} ב${monthStr}` : `${dayStr} ${monthStr}`;
    }

    function formatParentRelation(gender, fatherName, motherName, lang) {
      const isMale = gender === 'male';
      const sonDtr = isMale ? 
        (lang === 'he' ? 'בן' : lang === 'en' ? 'son of' : 'сын') : 
        (lang === 'he' ? 'בת' : lang === 'en' ? 'daughter of' : 'дочь');
      const father = fatherName ? fatherName.trim() : (lang === 'he' ? 'אברהם' : 'Abraham');
      const mother = motherName ? ` ו${motherName.trim()}` : '';
      return `${sonDtr} ${father}${mother}`;
    }

    // Precise calculation of upcoming Gregorian Gregorian Date of Yahrzeit
    function getNextYahrzeitGregorian(deceasedDay, deceasedMonthName) {
      const currentYear = new Date().getFullYear();
      const normMonth = normalizeMonthName(deceasedMonthName);
      
      // Look in current year first, if already passed, look in next year
      for (let offset = 0; offset <= 1; offset++) {
        const targetYear = currentYear + offset;
        const start = new Date(targetYear, 0, 1);
        const end = new Date(targetYear, 11, 31);
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
          const hb = getHebrewDateInfo(d);
          if (hb.day === Number(deceasedDay) && hb.normalizedMonth === normMonth) {
            if (offset === 1 || d >= new Date().setHours(0,0,0,0)) {
              return new Date(d);
            }
          }
        }
      }
      return new Date();
    }

              {activeTab === 'book' && (
                <div className="space-y-6">
                  {HEBREW_MONTHS_HE.map(monthName => {
                    const monthDeceased = filteredList.filter(d => normalizeMonthName(d.month) === normalizeMonthName(monthName));
                    if (monthDeceased.length === 0) return null;
                    return (
                      <div key={monthName} className="bg-[#131a26] border border-gray-800 rounded-xl p-6 shadow-lg">
                        <h3 className="text-xl font-serif font-bold text-[#c8a96e] border-b border-gray-800 pb-2 mb-4 text-right">
                          חודש {monthName}
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                          {monthDeceased.map(deceased => (
                            <div 
                              key={deceased.id} 
                              onClick={() => setSelectedDeceased(deceased)}
                              className="bg-[#1b2536] hover:bg-[#202b3d] border border-gray-800 hover:border-[#c8a96e]/30 p-4 rounded-xl cursor-pointer transition-all flex items-center justify-between"
                            >
                              <div className="flex items-center gap-4 text-right">
                                <span className="text-2xl">🕯️</span>
                                <div>
                                  <h4 className="font-serif font-bold text-amber-100">{deceased.name}</h4>
                                  <p className="text-xs text-[#c8a96e]/80">{formatParentRelation(deceased.gender, deceased.fatherName, deceased.motherName, lang)}</p>
                                </div>
                              </div>
                              <div className="text-left text-[#c8a96e] font-serif font-bold text-lg">
                                יום {gimatriya(deceased.day)}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* TAB 3: 30-DAY HEBREW GRID */}
              {activeTab === 'grid' && (
                <div className="bg-[#131a26] border border-gray-800 rounded-2xl p-6 shadow-xl">
                  <h3 className="text-xl font-serif text-[#c8a96e] mb-6 text-center">{t.quick30Grid}</h3>
                  <div className="grid grid-cols-5 sm:grid-cols-10 gap-3">
                    {Array.from({ length: 30 }, (_, i) => i + 1).map(dayNum => {
                      const dayObs = filteredList.filter(d => Number(d.day) === dayNum);
                      return (
                        <div 
                          key={dayNum}
                          className={`aspect-square rounded-xl border flex flex-col items-center justify-center cursor-pointer transition-all p-2 text-center ${dayObs.length > 0 ? 'bg-amber-500/10 border-[#c8a96e] text-[#c8a96e]' : 'bg-[#1b2536] border-gray-800 text-gray-400 hover:border-gray-600'}`}
                          onClick={() => {
                            if (dayObs.length > 0) {
                              setSelectedDeceased(dayObs[0]);
                            } else {
                              alert(lang === 'he' ? `אין אזכרות משפחתיות ביום זה (${dayNum})` : `No observances for day ${dayNum}`);
                            }
                          }}
                        >
                          <span className="text-xs text-gray-500 block mb-1">{dayNum}</span>
                          <span className="text-base font-serif font-bold block">{gimatriya(dayNum)}</span>
                          {dayObs.length > 0 && <span className="w-1.5 h-1.5 rounded-full bg-[#c8a96e] mt-1"></span>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* TAB 4: ADD/EDIT FORM */}
              {activeTab === 'add' && (
                <div className="bg-[#131a26] border border-[#c8a96e]/20 rounded-2xl p-6 shadow-xl max-w-2xl mx-auto">
                  <h3 className="text-2xl font-serif text-[#c8a96e] mb-6 text-center">
                    {editingDeceased ? t.submitSave : t.addMemorial}
                  </h3>
                  
                  <form onSubmit={saveDeceased} className="space-y-4 text-right">
                    
                    <div>
                      <label className="block text-sm font-semibold text-gray-300 mb-1">{t.fullName}</label>
                      <input 
                        type="text" 
                        required 
                        value={formData.name}
                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                        className="w-full bg-[#1b2536] border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-[#c8a96e] text-right" 
                        placeholder={t.namePlaceholder} 
                      />
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-semibold text-gray-300 mb-1">{t.gender}</label>
                        <select 
                          value={formData.gender}
                          onChange={(e) => setFormData({...formData, gender: e.target.value})}
                          className="w-full bg-[#1b2536] border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-[#c8a96e] text-right"
                        >
                          <option value="male">{t.male}</option>
                          <option value="female">{t.female}</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-gray-300 mb-1">{t.hebrewDay}</label>
                        <input 
                          type="number" 
                          min="1" 
                          max="30" 
                          required
                          value={formData.day}
                          onChange={(e) => setFormData({...formData, day: parseInt(e.target.value, 10)})}
                          className="w-full bg-[#1b2536] border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-[#c8a96e] text-right" 
                        />
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-semibold text-gray-300 mb-1">{t.fatherName}</label>
                        <input 
                          type="text" 
                          value={formData.fatherName}
                          onChange={(e) => setFormData({...formData, fatherName: e.target.value})}
                          className="w-full bg-[#1b2536] border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-[#c8a96e] text-right" 
                          placeholder={t.fatherPlaceholder} 
                        />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-gray-300 mb-1">{t.motherName}</label>
                        <input 
                          type="text" 
                          value={formData.motherName}
                          onChange={(e) => setFormData({...formData, motherName: e.target.value})}
                          className="w-full bg-[#1b2536] border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-[#c8a96e] text-right" 
                          placeholder={t.motherPlaceholder} 
                        />
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm font-semibold text-gray-300 mb-1">{t.hebrewMonth}</label>
                        <select 
                          value={formData.month}
                          onChange={(e) => setFormData({...formData, month: e.target.value})}
                          className="w-full bg-[#1b2536] border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-[#c8a96e] text-right"
                        >
                          {HEBREW_MONTHS_HE.map(m => (
                            <option key={m} value={m}>{m}</option>
                          ))}
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold text-gray-300 mb-1">{t.contactPhone}</label>
                        <input 
                          type="text" 
                          value={formData.contactPhone}
                          onChange={(e) => setFormData({...formData, contactPhone: e.target.value})}
                          className="w-full bg-[#1b2536] border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-[#c8a96e] text-right" 
                          placeholder={t.phonePlaceholder} 
                        />
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-gray-300 mb-1">{t.uploadImage}</label>
                      <input 
                        type="text" 
                        value={formData.image}
                        onChange={(e) => setFormData({...formData, image: e.target.value})}
                        className="w-full bg-[#1b2536] border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-[#c8a96e] text-right" 
                        placeholder="https://example.com/photo.jpg" 
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-gray-300 mb-1">{t.lifeStory}</label>
                      <textarea 
                        rows="3"
                        value={formData.notes}
                        onChange={(e) => setFormData({...formData, notes: e.target.value})}
                        className="w-full bg-[#1b2536] border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-[#c8a96e] text-right" 
                        placeholder={t.notesPlaceholder}
                      ></textarea>
                    </div>

                    <div className="flex gap-4 pt-4">
                      <button type="submit" className="flex-1 bg-amber-600 hover:bg-amber-700 text-black font-bold py-3 rounded-xl transition-all">{editingDeceased ? t.submitSave : t.submitAdd}</button>
                      <button type="button" onClick={() => { setEditingDeceased(null); setActiveTab('bulletin'); }} className="bg-gray-800 hover:bg-gray-700 text-white px-6 py-3 rounded-xl transition-all">{t.cancel}</button>
                    </div>
                  </form>
                </div>
              )}

              {/* TAB 5: BACKUP & DATA IMPORT */}
              {activeTab === 'import' && (
                <div className="bg-[#131a26] border border-gray-800 rounded-2xl p-6 shadow-xl max-w-2xl mx-auto text-right">
                  <h3 className="text-2xl font-serif text-[#c8a96e] mb-4 text-center">{t.importTitle}</h3>
                  <p className="text-sm text-gray-400 mb-6 text-center">השתמש בגיבוי זה כדי להעביר את כל רשימת הנפטרים של המשפחה בין מחשבים וטלפונים שונים.</p>
                  
                  <div className="space-y-6">
                    <div className="border-2 border-dashed border-gray-700 rounded-xl p-6 text-center hover:border-[#c8a96e]/50 transition-all">
                      <button onClick={downloadBackup} className="bg-amber-600/10 hover:bg-amber-600/20 border border-[#c8a96e]/30 text-[#c8a96e] font-bold px-6 py-3 rounded-xl transition-all inline-flex items-center gap-2">
                        <Icon name="download" />
                        <span>{t.downloadTemplate}</span>
                      </button>
                    </div>

                    <div>
                      <label className="block text-sm font-semibold text-gray-300 mb-2">{t.bulkPasteLabel}</label>
                      <textarea 
                        rows="6"
                        id="pasteArea"
                        className="w-full bg-[#1b2536] border border-gray-700 rounded-xl p-4 font-mono text-xs focus:outline-none focus:border-[#c8a96e] text-left"
                        placeholder={t.bulkPastePlaceholder}
                      ></textarea>
                      <button 
                        onClick={() => {
                          const val = document.getElementById('pasteArea').value;
                          try {
                            const parsed = JSON.parse(val);
                            if (Array.isArray(parsed)) {
                              setMasterList(parsed);
                              localStorage.setItem('eternal_db_single', JSON.stringify(parsed));
                              alert(t.importSuccess);
                              setActiveTab('bulletin');
                            } else {
                              alert(t.importError);
                            }
                          } catch (e) {
                            alert(t.importError);
                          }
                        }}
                        className="w-full bg-[#c8a96e] hover:bg-[#e5cf9c] text-black font-bold py-3 rounded-xl transition-all mt-4"
                      >
                        {t.importButton}
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

</body>
</html>
